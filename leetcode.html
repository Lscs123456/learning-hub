<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LeetCode 刷题追踪</title>
<style>
  :root {
    --bg: #f9f9f7; --surface: #ffffff; --border: #e8e8e4; --border-light: #f0f0ec;
    --text: #1a1a18; --text-muted: #888884; --text-hint: #b8b8b4;
    --radius: 8px; --radius-lg: 12px;
    --easy-bg: #eaf3de; --easy-text: #3b6d11;
    --med-bg: #faeeda;  --med-text: #854f0b;
    --hard-bg: #fcebeb; --hard-text: #a32d2d;
    --s1-bg: #eaf3de; --s1-text: #3b6d11; --s1-border: #7fba4a;
    --s2-bg: #e6f1fb; --s2-text: #0c447c; --s2-border: #378add;
    --s3-bg: #faeeda; --s3-text: #854f0b; --s3-border: #ef9f27;
    --s4-bg: #fcebeb; --s4-text: #a32d2d; --s4-border: #e24b4a;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #141412; --surface: #1e1e1c; --border: #2e2e2a;
      --border-light: #242422; --text: #f0f0ec; --text-muted: #888884; --text-hint: #4a4a46;
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, 'PingFang SC', 'Helvetica Neue', sans-serif; font-size: 14px; line-height: 1.6; }
  .app { max-width: 760px; margin: 0 auto; padding: 2rem 1.25rem 4rem; }
  .back { font-size: 13px; color: var(--text-muted); text-decoration: none; display: inline-flex; align-items: center; gap: 4px; margin-bottom: 1.5rem; }
  .back:hover { color: var(--text); }
  header { margin-bottom: 2rem; }
  h1 { font-size: 22px; font-weight: 500; margin-bottom: 4px; }
  .subtitle { font-size: 13px; color: var(--text-muted); }
  .stats { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-bottom: 1.75rem; }
  .stat { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 10px 12px; text-align: center; cursor: pointer; transition: border-color 0.12s; }
  .stat:hover { border-color: var(--text-muted); }
  .stat.active { border-color: var(--text); }
  .stat-num { font-size: 20px; font-weight: 500; display: block; }
  .stat-label { font-size: 11px; color: var(--text-muted); }
  .filter-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 1.25rem; align-items: center; }
  .filter-label { font-size: 12px; color: var(--text-muted); margin-right: 2px; }
  .chip { font-size: 12px; padding: 4px 10px; border-radius: 20px; border: 0.5px solid var(--border); background: transparent; cursor: pointer; color: var(--text-muted); transition: all 0.12s; }
  .chip:hover { border-color: var(--text-muted); color: var(--text); }
  .chip.on { background: var(--text); color: var(--bg); border-color: var(--text); }
  input[type=search] { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 6px 12px; font-size: 13px; color: var(--text); outline: none; width: 160px; }
  input[type=search]:focus { border-color: var(--text-muted); }
  .section { margin-bottom: 1.5rem; }
  .section-head { font-size: 12px; font-weight: 500; color: var(--text-muted); padding: 0 0 6px; border-bottom: 0.5px solid var(--border-light); margin-bottom: 6px; display: flex; justify-content: space-between; }
  .section-head span { font-weight: 400; color: var(--text-hint); }
  .row { display: flex; align-items: center; gap: 10px; padding: 8px 10px; border-radius: var(--radius); transition: background 0.1s; }
  .row:hover { background: var(--surface); }
  .num { font-size: 12px; color: var(--text-hint); min-width: 36px; font-variant-numeric: tabular-nums; }
  .name { flex: 1; font-size: 13px; }
  .name a { color: var(--text); text-decoration: none; }
  .name a:hover { text-decoration: underline; text-underline-offset: 2px; }
  .badge { font-size: 11px; padding: 2px 7px; border-radius: 4px; white-space: nowrap; }
  .easy { background: var(--easy-bg); color: var(--easy-text); }
  .med  { background: var(--med-bg);  color: var(--med-text); }
  .hard { background: var(--hard-bg); color: var(--hard-text); }
  .status-btn { font-size: 11px; padding: 3px 9px; border-radius: 5px; border: 0.5px solid var(--border); background: transparent; color: var(--text-hint); cursor: pointer; white-space: nowrap; transition: all 0.12s; min-width: 62px; text-align: center; }
  .status-btn:hover { border-color: var(--text-muted); }
  .s1 { background: var(--s1-bg); color: var(--s1-text); border-color: var(--s1-border); }
  .s2 { background: var(--s2-bg); color: var(--s2-text); border-color: var(--s2-border); }
  .s3 { background: var(--s3-bg); color: var(--s3-text); border-color: var(--s3-border); }
  .s4 { background: var(--s4-bg); color: var(--s4-text); border-color: var(--s4-border); }
  .icon-btn { background: transparent; border: 0.5px solid var(--border); border-radius: var(--radius); padding: 5px 10px; cursor: pointer; color: var(--text-muted); font-size: 12px; transition: all 0.12s; white-space: nowrap; }
  .icon-btn:hover { border-color: var(--text-muted); color: var(--text); }
  .empty { text-align: center; padding: 3rem 0; color: var(--text-hint); font-size: 13px; }
  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: var(--text); color: var(--bg); font-size: 13px; padding: 8px 18px; border-radius: 20px; opacity: 0; pointer-events: none; transition: opacity 0.2s; z-index: 999; }
  .toast.show { opacity: 1; }
</style>
</head>
<body>
<div class="app">
  <a class="back" href="index.html">← 学习中心</a>
  <header>
    <h1>LeetCode 刷题追踪</h1>
    <p class="subtitle">点击状态标签切换进度 · 未标记 → 初识 → 能讲 → 能用 → 题破</p>
  </header>

  <div class="stats" id="stats"></div>

  <div class="filter-row">
    <span class="filter-label">筛选</span>
    <button class="chip on" onclick="setFilter('all',this)">全部</button>
    <button class="chip" onclick="setFilter(0,this)">未标记</button>
    <button class="chip" onclick="setFilter(1,this)">初识</button>
    <button class="chip" onclick="setFilter(2,this)">能讲</button>
    <button class="chip" onclick="setFilter(3,this)">能用</button>
    <button class="chip" onclick="setFilter(4,this)">题破</button>
    <div style="margin-left:auto;display:flex;gap:8px;align-items:center">
      <input type="search" id="search" placeholder="搜索题目…" oninput="render()">
      <button class="icon-btn" onclick="exportData()">导出</button>
      <button class="icon-btn" onclick="document.getElementById('imp').click()">导入</button>
      <input type="file" id="imp" accept=".json" style="display:none" onchange="importData(event)">
    </div>
  </div>

  <div id="list"></div>
</div>
<div class="toast" id="toast"></div>
<script>
const STATES = ['未标记','初识','能讲','能用','题破'];
const SCLS   = ['','s1','s2','s3','s4'];
const KEY    = 'lc_tracker_v1';

const DATA = [
  {cat:'哈希', problems:[
    {id:1,name:'两数之和',diff:'简单'},{id:49,name:'字母异位词分组',diff:'中等'},{id:128,name:'最长连续序列',diff:'中等'},
  ]},
  {cat:'双指针', problems:[
    {id:283,name:'移动零',diff:'简单'},{id:11,name:'盛最多水的容器',diff:'中等'},{id:15,name:'三数之和',diff:'中等'},{id:42,name:'接雨水',diff:'困难'},
  ]},
  {cat:'滑动窗口', problems:[
    {id:3,name:'无重复字符的最长子串',diff:'中等'},{id:438,name:'找到字符串中所有字母异位词',diff:'中等'},
  ]},
  {cat:'子串', problems:[
    {id:560,name:'和为 K 的子数组',diff:'中等'},{id:239,name:'滑动窗口最大值',diff:'困难'},{id:76,name:'最小覆盖子串',diff:'困难'},
  ]},
  {cat:'普通数组', problems:[
    {id:53,name:'最大子数组和',diff:'中等'},{id:56,name:'合并区间',diff:'中等'},{id:189,name:'轮转数组',diff:'中等'},{id:238,name:'除自身以外数组的乘积',diff:'中等'},{id:41,name:'缺失的第一个正数',diff:'困难'},
  ]},
  {cat:'矩阵', problems:[
    {id:73,name:'矩阵置零',diff:'中等'},{id:54,name:'螺旋矩阵',diff:'中等'},{id:48,name:'旋转图像',diff:'中等'},{id:240,name:'搜索二维矩阵 II',diff:'中等'},
  ]},
  {cat:'链表', problems:[
    {id:160,name:'相交链表',diff:'简单'},{id:206,name:'反转链表',diff:'简单'},{id:234,name:'回文链表',diff:'简单'},{id:141,name:'环形链表',diff:'简单'},
    {id:142,name:'环形链表 II',diff:'中等'},{id:21,name:'合并两个有序链表',diff:'简单'},{id:2,name:'两数相加',diff:'中等'},
    {id:19,name:'删除链表的倒数第 N 个结点',diff:'中等'},{id:24,name:'两两交换链表中的节点',diff:'中等'},{id:25,name:'K 个一组翻转链表',diff:'困难'},
    {id:138,name:'随机链表的复制',diff:'中等'},{id:148,name:'排序链表',diff:'中等'},{id:23,name:'合并 K 个升序链表',diff:'困难'},{id:146,name:'LRU 缓存',diff:'中等'},
  ]},
  {cat:'二叉树', problems:[
    {id:94,name:'二叉树的中序遍历',diff:'简单'},{id:104,name:'二叉树的最大深度',diff:'简单'},{id:226,name:'翻转二叉树',diff:'简单'},
    {id:101,name:'对称二叉树',diff:'简单'},{id:543,name:'二叉树的直径',diff:'简单'},{id:102,name:'二叉树的层序遍历',diff:'中等'},
    {id:108,name:'将有序数组转换为二叉搜索树',diff:'简单'},{id:98,name:'验证二叉搜索树',diff:'中等'},{id:230,name:'二叉搜索树中第 K 小的元素',diff:'中等'},
    {id:199,name:'二叉树的右视图',diff:'中等'},{id:114,name:'二叉树展开为链表',diff:'中等'},{id:105,name:'从前序与中序遍历序列构造二叉树',diff:'中等'},
    {id:437,name:'路径总和 III',diff:'中等'},{id:236,name:'二叉树的最近公共祖先',diff:'中等'},{id:124,name:'二叉树中的最大路径和',diff:'困难'},
  ]},
  {cat:'图论', problems:[
    {id:200,name:'岛屿数量',diff:'中等'},{id:994,name:'腐烂的橘子',diff:'中等'},{id:207,name:'课程表',diff:'中等'},{id:208,name:'实现 Trie（前缀树）',diff:'中等'},
  ]},
  {cat:'回溯', problems:[
    {id:46,name:'全排列',diff:'中等'},{id:78,name:'子集',diff:'中等'},{id:17,name:'电话号码的字母组合',diff:'中等'},{id:39,name:'组合总和',diff:'中等'},
    {id:22,name:'括号生成',diff:'中等'},{id:79,name:'单词搜索',diff:'中等'},{id:131,name:'分割回文串',diff:'中等'},{id:51,name:'N 皇后',diff:'困难'},
  ]},
  {cat:'二分查找', problems:[
    {id:35,name:'搜索插入位置',diff:'简单'},{id:74,name:'搜索二维矩阵',diff:'中等'},{id:34,name:'在排序数组中查找元素的第一个和最后一个位置',diff:'中等'},
    {id:33,name:'搜索旋转排序数组',diff:'中等'},{id:153,name:'寻找旋转排序数组中的最小值',diff:'中等'},{id:4,name:'寻找两个正序数组的中位数',diff:'困难'},
  ]},
  {cat:'栈', problems:[
    {id:20,name:'有效的括号',diff:'简单'},{id:155,name:'最小栈',diff:'中等'},{id:394,name:'字符串解码',diff:'中等'},{id:739,name:'每日温度',diff:'中等'},{id:84,name:'柱状图中最大的矩形',diff:'困难'},
  ]},
  {cat:'堆', problems:[
    {id:215,name:'数组中的第 K 个最大元素',diff:'中等'},{id:347,name:'前 K 个高频元素',diff:'中等'},{id:295,name:'数据流的中位数',diff:'困难'},
  ]},
  {cat:'贪心算法', problems:[
    {id:121,name:'买卖股票的最佳时机',diff:'简单'},{id:55,name:'跳跃游戏',diff:'中等'},{id:45,name:'跳跃游戏 II',diff:'中等'},{id:763,name:'划分字母区间',diff:'中等'},
  ]},
  {cat:'动态规划', problems:[
    {id:70,name:'爬楼梯',diff:'简单'},{id:118,name:'杨辉三角',diff:'简单'},{id:198,name:'打家劫舍',diff:'中等'},{id:279,name:'完全平方数',diff:'中等'},
    {id:322,name:'零钱兑换',diff:'中等'},{id:139,name:'单词拆分',diff:'中等'},{id:300,name:'最长递增子序列',diff:'中等'},{id:152,name:'乘积最大子数组',diff:'中等'},
    {id:416,name:'分割等和子集',diff:'中等'},{id:32,name:'最长有效括号',diff:'困难'},
  ]},
  {cat:'多维动态规划', problems:[
    {id:62,name:'不同路径',diff:'中等'},{id:64,name:'最小路径和',diff:'中等'},{id:5,name:'最长回文子串',diff:'中等'},{id:1143,name:'最长公共子序列',diff:'中等'},{id:72,name:'编辑距离',diff:'中等'},
  ]},
  {cat:'技巧', problems:[
    {id:136,name:'只出现一次的数字',diff:'简单'},{id:169,name:'多数元素',diff:'简单'},{id:75,name:'颜色分类',diff:'中等'},{id:31,name:'下一个排列',diff:'中等'},{id:287,name:'寻找重复数',diff:'中等'},
  ]},
];

let st = {};
try { st = JSON.parse(localStorage.getItem(KEY)) || {}; } catch(e) {}
let filter = 'all';
function save() { try { localStorage.setItem(KEY, JSON.stringify(st)); } catch(e) {} }
function nextState(id) { st[id] = ((st[id] ?? 0) + 1) % 5; save(); render(); }
function setFilter(f, btn) { filter = f; document.querySelectorAll('.chip').forEach(b => b.classList.remove('on')); btn.classList.add('on'); render(); }
function diffCls(d) { return d==='简单'?'easy':d==='中等'?'med':'hard'; }
function toast(msg) { const el=document.getElementById('toast'); el.textContent=msg; el.classList.add('show'); setTimeout(()=>el.classList.remove('show'),1800); }
function exportData() {
  const blob=new Blob([JSON.stringify(st,null,2)],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download=`lc_backup_${new Date().toISOString().slice(0,10)}.json`; a.click(); toast('备份已导出');
}
function importData(e) {
  const file=e.target.files[0]; if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{ try{ st=JSON.parse(ev.target.result); save(); render(); toast('导入成功'); }catch{ toast('文件格式错误'); } };
  reader.readAsText(file); e.target.value='';
}
function render() {
  const q=document.getElementById('search').value.trim().toLowerCase();
  const counts=[0,0,0,0,0];
  DATA.forEach(s=>s.problems.forEach(p=>counts[st[p.id]??0]++));
  document.getElementById('stats').innerHTML=counts.map((n,i)=>
    `<div class="stat${filter===(i===0?'all':i)?' active':''}" onclick="setFilter(${i===0?"'all'":i},this)">
      <span class="stat-num">${n}</span><span class="stat-label">${STATES[i]}</span>
    </div>`
  ).join('');
  let html='', total=0;
  DATA.forEach(sec=>{
    const rows=sec.problems.filter(p=>{
      const s=st[p.id]??0;
      return (filter==='all'||s===filter)&&(!q||p.name.includes(q)||String(p.id).includes(q));
    });
    if(!rows.length)return;
    total+=rows.length;
    html+=`<div class="section"><div class="section-head">${sec.cat}<span>${rows.length} 题</span></div>`;
    rows.forEach(p=>{
      const s=st[p.id]??0;
      html+=`<div class="row">
        <span class="num">${p.id}</span>
        <span class="name"><a href="https://leetcode.cn/problems/" target="_blank">${p.name}</a></span>
        <span class="badge ${diffCls(p.diff)}">${p.diff}</span>
        <button class="status-btn ${SCLS[s]}" onclick="nextState(${p.id})">${STATES[s]}</button>
      </div>`;
    });
    html+='</div>';
  });
  if(!total)html='<div class="empty">没有匹配的题目</div>';
  document.getElementById('list').innerHTML=html;
}
render();
</script>
</body>
</html>
