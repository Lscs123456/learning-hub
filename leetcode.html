<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LeetCode 刷题追踪</title>
<style>
  :root {
    --bg: #f9f9f7; --surface: #ffffff; --border: #e8e8e4; --border-light: #f0f0ec;
    --text: #1a1a18; --text-muted: #888884; --text-hint: #b8b8b4;
    --radius: 8px; --radius-lg: 12px;
    --easy-bg: #eaf3de; --easy-text: #3b6d11;
    --med-bg: #faeeda;  --med-text: #854f0b;
    --hard-bg: #fcebeb; --hard-text: #a32d2d;
    --s1-bg: #eaf3de; --s1-text: #3b6d11; --s1-border: #7fba4a;
    --s2-bg: #e6f1fb; --s2-text: #0c447c; --s2-border: #378add;
    --s3-bg: #faeeda; --s3-text: #854f0b; --s3-border: #ef9f27;
    --s4-bg: #fcebeb; --s4-text: #a32d2d; --s4-border: #e24b4a;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #141412; --surface: #1e1e1c; --border: #2e2e2a;
      --border-light: #242422; --text: #f0f0ec; --text-muted: #888884; --text-hint: #4a4a46;
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, 'PingFang SC', 'Helvetica Neue', sans-serif; font-size: 14px; line-height: 1.6; }
  .app { max-width: 760px; margin: 0 auto; padding: 2rem 1.25rem 4rem; }
  .back { font-size: 13px; color: var(--text-muted); text-decoration: none; display: inline-flex; align-items: center; gap: 4px; margin-bottom: 1.5rem; }
  .back:hover { color: var(--text); }
  header { margin-bottom: 2rem; }
  h1 { font-size: 22px; font-weight: 500; margin-bottom: 4px; }
  .subtitle { font-size: 13px; color: var(--text-muted); }
  .stats { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-bottom: 1.75rem; }
  .stat { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 10px 12px; text-align: center; cursor: pointer; transition: border-color 0.12s; }
  .stat:hover { border-color: var(--text-muted); }
  .stat.active { border-color: var(--text); }
  .stat-num { font-size: 20px; font-weight: 500; display: block; }
  .stat-label { font-size: 11px; color: var(--text-muted); }
  .filter-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 1.25rem; align-items: center; }
  .filter-label { font-size: 12px; color: var(--text-muted); margin-right: 2px; }
  .chip { font-size: 12px; padding: 4px 10px; border-radius: 20px; border: 0.5px solid var(--border); background: transparent; cursor: pointer; color: var(--text-muted); transition: all 0.12s; }
  .chip:hover { border-color: var(--text-muted); color: var(--text); }
  .chip.on { background: var(--text); color: var(--bg); border-color: var(--text); }
  input[type=search] { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 6px 12px; font-size: 13px; color: var(--text); outline: none; width: 160px; }
  input[type=search]:focus { border-color: var(--text-muted); }
  .section { margin-bottom: 1.5rem; }
  .section-head { font-size: 12px; font-weight: 500; color: var(--text-muted); padding: 0 0 6px; border-bottom: 0.5px solid var(--border-light); margin-bottom: 6px; display: flex; justify-content: space-between; }
  .section-head span { font-weight: 400; color: var(--text-hint); }
  .row { display: flex; align-items: center; gap: 10px; padding: 8px 10px; border-radius: var(--radius); transition: background 0.1s; }
  .row:hover { background: var(--surface); }
  .num { font-size: 12px; color: var(--text-hint); min-width: 36px; font-variant-numeric: tabular-nums; }
  .name { flex: 1; font-size: 13px; }
  .name a { color: var(--text); text-decoration: none; }
  .name a:hover { text-decoration: underline; text-underline-offset: 2px; }
  .badge { font-size: 11px; padding: 2px 7px; border-radius: 4px; white-space: nowrap; }
  .easy { background: var(--easy-bg); color: var(--easy-text); }
  .med  { background: var(--med-bg);  color: var(--med-text); }
  .hard { background: var(--hard-bg); color: var(--hard-text); }
  .status-btn { font-size: 11px; padding: 3px 9px; border-radius: 5px; border: 0.5px solid var(--border); background: transparent; color: var(--text-hint); cursor: pointer; white-space: nowrap; transition: all 0.12s; min-width: 62px; text-align: center; }
  .status-btn:hover { border-color: var(--text-muted); }
  .s1 { background: var(--s1-bg); color: var(--s1-text); border-color: var(--s1-border); }
  .s2 { background: var(--s2-bg); color: var(--s2-text); border-color: var(--s2-border); }
  .s3 { background: var(--s3-bg); color: var(--s3-text); border-color: var(--s3-border); }
  .s4 { background: var(--s4-bg); color: var(--s4-text); border-color: var(--s4-border); }
  .icon-btn { background: transparent; border: 0.5px solid var(--border); border-radius: var(--radius); padding: 5px 10px; cursor: pointer; color: var(--text-muted); font-size: 12px; transition: all 0.12s; white-space: nowrap; }
  .icon-btn:hover { border-color: var(--text-muted); color: var(--text); }
  .empty { text-align: center; padding: 3rem 0; color: var(--text-hint); font-size: 13px; }
  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: var(--text); color: var(--bg); font-size: 13px; padding: 8px 18px; border-radius: 20px; opacity: 0; pointer-events: none; transition: opacity 0.2s; z-index: 999; }
  .toast.show { opacity: 1; }
</style>
</head>
<body>
<div class="app">
  <a class="back" href="index.html">← 学习中心</a>
  <header style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:12px;margin-bottom:2rem;">
    <div>
      <h1>LeetCode 刷题追踪</h1>
      <p class="subtitle">点击状态标签切换进度 · 未标记 → 初识 → 能讲 → 能用 → 题破</p>
    </div>
    <button id="review-btn" class="icon-btn" onclick="openReview()" style="display:none;align-items:center;gap:6px;padding:8px 16px;font-size:13px;border-radius:8px;">
      📌 今日复习 <span id="due-count" style="background:var(--text);color:var(--bg);border-radius:10px;padding:1px 7px;font-size:11px;"></span>
    </button>
  </header>

  <div class="stats" id="stats"></div>

  <div class="filter-row">
    <span class="filter-label">筛选</span>
    <button class="chip on" onclick="setFilter('all',this)">全部</button>
    <button class="chip" onclick="setFilter(0,this)">未标记</button>
    <button class="chip" onclick="setFilter(1,this)">初识</button>
    <button class="chip" onclick="setFilter(2,this)">能讲</button>
    <button class="chip" onclick="setFilter(3,this)">能用</button>
    <button class="chip" onclick="setFilter(4,this)">题破</button>
    <div style="margin-left:auto;display:flex;gap:8px;align-items:center">
      <input type="search" id="search" placeholder="搜索题目…" oninput="render()">
      <button class="icon-btn" onclick="exportData()">导出</button>
      <button class="icon-btn" onclick="document.getElementById('imp').click()">导入</button>
      <input type="file" id="imp" accept=".json" style="display:none" onchange="importData(event)">
    </div>
  </div>

  <div id="list"></div>
</div>
<div class="toast" id="toast"></div>
<script>
const STATES = ['未标记','初识','能讲','能用','题破'];
const SCLS   = ['','s1','s2','s3','s4'];
const KEY    = 'lc_tracker_v2';

// ── FSRS-4.5 默认参数 ──────────────────────────────────────────
const W = [0.4072,1.1829,3.1262,15.4722,7.2102,0.5316,1.0651,0.0589,
           1.5330,0.1544,0.9866,1.9813,0.0953,0.2975,2.2042,0.2407,
           2.9466,0.5034,0.6567];
const DECAY = -0.5, FACTOR = 0.9 ** (1/DECAY) - 1;
const RATING = {Again:1, Hard:2, Good:3, Easy:4};

function forgetting_curve(t, s) { return (1 + FACTOR * t / s) ** DECAY; }

function init_stability(r) { return W[r-1]; }
function init_difficulty(r) { return W[4] - Math.exp(W[5]*(r-1)) + 1; }
function clamp_d(d) { return Math.min(10, Math.max(1, d)); }

function next_interval(s, r=0.9) {
  return Math.max(1, Math.round(s / FACTOR * (r ** (1/DECAY) - 1)));
}

function short_term_stability(s, r) {
  return s * Math.exp(W[17] * (r - 3 + W[18]));
}

function long_term_difficulty(d, r) {
  return clamp_d(W[6]*init_difficulty(4) + (1-W[6])*(d - W[7]*(r-3)));
}

function long_term_stability(d, s, r, t) {
  const ret = r === RATING.Again;
  const base = ret ? W[11] : W[8];
  const ds = ret ? 0 : Math.exp(W[9]*(1-forgetting_curve(t,s)))-1;
  const hard_pen = r === RATING.Hard ? W[15] : 1;
  const easy_bon = r === RATING.Easy ? W[16] : 1;
  return s * (Math.exp(base) * (11-d) * s**(-W[10]) * ds * hard_pen * easy_bon + 1);
}

// card state: 0=New, 1=Learning, 2=Review, 3=Relearning
function fsrs_schedule(card, rating_str) {
  const r = RATING[rating_str];
  const now = today();
  const t = card.last_review ? daysBetween(card.last_review, now) : 0;
  let {stability:s, difficulty:d, state, step} = card;

  if (state === 0) {
    // New → Learning
    s = init_stability(r);
    d = init_difficulty(r);
    if (r === RATING.Again) { step = 0; state = 1; }
    else if (r === RATING.Hard) { step = 0; state = 1; }
    else if (r === RATING.Good) { step = 1; state = 1; }
    else { state = 2; } // Easy → straight to review
  } else if (state === 1 || state === 3) {
    // Learning / Relearning
    s = short_term_stability(s, r);
    if (r === RATING.Again) { step = 0; }
    else if (r === RATING.Good) { step = (step||0) + 1; }
    if (r === RATING.Easy || (step||0) >= 2) { state = 2; }
    if (r === RATING.Hard) { /* stay */ }
  } else {
    // Review
    d = long_term_difficulty(d, r);
    s = r === RATING.Again
      ? long_term_stability(d, s, r, t)
      : long_term_stability(d, s, r, t);
    state = r === RATING.Again ? 3 : 2;
  }

  const interval = (state === 2) ? next_interval(s) : (r === RATING.Again ? 1 : 1);
  const due = addDays(now, interval);
  return { stability: Math.max(0.1, s), difficulty: clamp_d(d), state, step: step||0, due, last_review: now, interval };
}

function today() { return new Date().toISOString().slice(0,10); }
function addDays(d, n) {
  const dt = new Date(d + 'T00:00:00');
  dt.setDate(dt.getDate() + n);
  return dt.toISOString().slice(0,10);
}
function daysBetween(a, b) {
  return Math.round((new Date(b+'T00:00:00') - new Date(a+'T00:00:00')) / 86400000);
}

function newCard() { return { mastery:0, stability:0, difficulty:5, state:0, step:0, due: today(), last_review:null, interval:0 }; }

// ── 存储 ──────────────────────────────────────────────────────
let st = {};
try { st = JSON.parse(localStorage.getItem(KEY)) || {}; } catch(e) {}

// 迁移旧数据 lc_tracker_v1
(function migrate() {
  let old = {};
  try { old = JSON.parse(localStorage.getItem('lc_tracker_v1')) || {}; } catch(e) {}
  Object.keys(old).forEach(id => {
    if (!st[id]) {
      st[id] = newCard();
      st[id].mastery = old[id] ?? 0;
      if (old[id] > 0) st[id].state = 2; // 已有掌握度视为进入复习
    }
  });
})();

function save() { try { localStorage.setItem(KEY, JSON.stringify(st)); } catch(e) {} }

// ── 今日复习计划 ───────────────────────────────────────────────
let reviewModal = null;
function getDueToday() {
  const t = today();
  const allProblems = DATA.flatMap(s => s.problems);
  return allProblems.filter(p => {
    const c = st[p.id];
    if (!c) return false;
    if (c.mastery === 4) return false; // 题破退出
    return c.due <= t;
  }).sort((a,b) => {
    const ca = st[a.id], cb = st[b.id];
    if (ca.mastery !== cb.mastery) return ca.mastery - cb.mastery;
    return (ca.due||'') < (cb.due||'') ? -1 : 1;
  });
}

function openReview() {
  const due = getDueToday();
  if (!due.length) { toast('🎉 今日无待复习题目'); return; }
  let idx = 0;
  showReviewCard(due, idx);
}

function showReviewCard(due, idx) {
  if (reviewModal) reviewModal.remove();
  if (idx >= due.length) {
    toast(`✅ 今日 ${due.length} 道复习完成！`);
    render(); return;
  }
  const p = due[idx];
  const c = st[p.id] || newCard();
  const modal = document.createElement('div');
  modal.id = 'review-modal';
  modal.style.cssText = `position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:1000;`;
  modal.innerHTML = `
    <div style="background:var(--surface);border:0.5px solid var(--border);border-radius:16px;padding:28px 28px 22px;max-width:440px;width:90%;box-shadow:0 8px 32px rgba(0,0,0,.18);">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;">
        <span style="font-size:12px;color:var(--text-muted);">复习 ${idx+1} / ${due.length}</span>
        <button onclick="closeReview()" style="background:none;border:none;cursor:pointer;color:var(--text-muted);font-size:18px;line-height:1;">✕</button>
      </div>
      <div style="margin-bottom:6px;display:flex;gap:8px;align-items:center;">
        <span style="font-size:13px;color:var(--text-hint);">#${p.id}</span>
        <span class="badge ${p.diff==='简单'?'easy':p.diff==='中等'?'med':'hard'}">${p.diff}</span>
        <span class="status-btn ${SCLS[c.mastery]}" style="pointer-events:none;">${STATES[c.mastery]}</span>
      </div>
      <div style="font-size:18px;font-weight:500;margin-bottom:20px;">
        <a href="https://leetcode.cn/problems/" target="_blank" style="color:var(--text);text-decoration:none;">${p.name} ↗</a>
      </div>
      <p style="font-size:12px;color:var(--text-muted);margin-bottom:14px;">回忆这道题的解法，再评价掌握程度：</p>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px;">
        ${[['Again','完全忘了','#fcebeb','#a32d2d'],['Hard','想起来了但有漏洞','#faeeda','#854f0b'],['Good','基本能写出来','#e6f1fb','#0c447c'],['Easy','很流畅完全掌握','#eaf3de','#3b6d11']].map(([r,desc,bg,col])=>`
          <button onclick="submitRating('${r}',${JSON.stringify(due).replace(/"/g,'&quot;')},${idx})"
            style="background:${bg};color:${col};border:none;border-radius:8px;padding:10px 6px;cursor:pointer;font-size:12px;font-weight:500;line-height:1.4;">
            ${r}<br><span style="font-size:10px;font-weight:400;opacity:.8;">${desc}</span>
          </button>`).join('')}
      </div>
      <p style="font-size:11px;color:var(--text-hint);margin-top:14px;text-align:center;">
        稳定性 ${c.stability.toFixed(1)} · 难度 ${c.difficulty.toFixed(1)} · 间隔 ${c.interval}天
      </p>
    </div>`;
  document.body.appendChild(modal);
  reviewModal = modal;
}

function submitRating(rating, due, idx) {
  const p = due[idx];
  if (!st[p.id]) st[p.id] = newCard();
  const result = fsrs_schedule(st[p.id], rating);
  st[p.id] = { ...st[p.id], ...result };
  // 同步掌握度：Easy→能用，Good→能讲，Hard/Again 不升级
  if (rating === 'Easy' && st[p.id].mastery < 3) st[p.id].mastery = Math.max(st[p.id].mastery, 3);
  else if (rating === 'Good' && st[p.id].mastery < 2) st[p.id].mastery = 2;
  save();
  showReviewCard(due, idx + 1);
}

function closeReview() { if (reviewModal) { reviewModal.remove(); reviewModal = null; } }

// ── 掌握度切换 ────────────────────────────────────────────────
function nextState(id) {
  if (!st[id]) st[id] = newCard();
  const prev = st[id].mastery;
  st[id].mastery = (prev + 1) % 5;
  // 首次标记（未标记→初识）时初始化 FSRS
  if (prev === 0 && st[id].state === 0) {
    st[id].state = 1;
    st[id].stability = init_stability(RATING.Good);
    st[id].difficulty = init_difficulty(RATING.Good);
    st[id].due = today();
  }
  save(); render();
}

const DATA = [
  {cat:'哈希', problems:[
    {id:1,name:'两数之和',diff:'简单'},{id:49,name:'字母异位词分组',diff:'中等'},{id:128,name:'最长连续序列',diff:'中等'},
  ]},
  {cat:'双指针', problems:[
    {id:283,name:'移动零',diff:'简单'},{id:11,name:'盛最多水的容器',diff:'中等'},{id:15,name:'三数之和',diff:'中等'},{id:42,name:'接雨水',diff:'困难'},
  ]},
  {cat:'滑动窗口', problems:[
    {id:3,name:'无重复字符的最长子串',diff:'中等'},{id:438,name:'找到字符串中所有字母异位词',diff:'中等'},
  ]},
  {cat:'子串', problems:[
    {id:560,name:'和为 K 的子数组',diff:'中等'},{id:239,name:'滑动窗口最大值',diff:'困难'},{id:76,name:'最小覆盖子串',diff:'困难'},
  ]},
  {cat:'普通数组', problems:[
    {id:53,name:'最大子数组和',diff:'中等'},{id:56,name:'合并区间',diff:'中等'},{id:189,name:'轮转数组',diff:'中等'},{id:238,name:'除自身以外数组的乘积',diff:'中等'},{id:41,name:'缺失的第一个正数',diff:'困难'},
  ]},
  {cat:'矩阵', problems:[
    {id:73,name:'矩阵置零',diff:'中等'},{id:54,name:'螺旋矩阵',diff:'中等'},{id:48,name:'旋转图像',diff:'中等'},{id:240,name:'搜索二维矩阵 II',diff:'中等'},
  ]},
  {cat:'链表', problems:[
    {id:160,name:'相交链表',diff:'简单'},{id:206,name:'反转链表',diff:'简单'},{id:234,name:'回文链表',diff:'简单'},{id:141,name:'环形链表',diff:'简单'},
    {id:142,name:'环形链表 II',diff:'中等'},{id:21,name:'合并两个有序链表',diff:'简单'},{id:2,name:'两数相加',diff:'中等'},
    {id:19,name:'删除链表的倒数第 N 个结点',diff:'中等'},{id:24,name:'两两交换链表中的节点',diff:'中等'},{id:25,name:'K 个一组翻转链表',diff:'困难'},
    {id:138,name:'随机链表的复制',diff:'中等'},{id:148,name:'排序链表',diff:'中等'},{id:23,name:'合并 K 个升序链表',diff:'困难'},{id:146,name:'LRU 缓存',diff:'中等'},
  ]},
  {cat:'二叉树', problems:[
    {id:94,name:'二叉树的中序遍历',diff:'简单'},{id:104,name:'二叉树的最大深度',diff:'简单'},{id:226,name:'翻转二叉树',diff:'简单'},
    {id:101,name:'对称二叉树',diff:'简单'},{id:543,name:'二叉树的直径',diff:'简单'},{id:102,name:'二叉树的层序遍历',diff:'中等'},
    {id:108,name:'将有序数组转换为二叉搜索树',diff:'简单'},{id:98,name:'验证二叉搜索树',diff:'中等'},{id:230,name:'二叉搜索树中第 K 小的元素',diff:'中等'},
    {id:199,name:'二叉树的右视图',diff:'中等'},{id:114,name:'二叉树展开为链表',diff:'中等'},{id:105,name:'从前序与中序遍历序列构造二叉树',diff:'中等'},
    {id:437,name:'路径总和 III',diff:'中等'},{id:236,name:'二叉树的最近公共祖先',diff:'中等'},{id:124,name:'二叉树中的最大路径和',diff:'困难'},
  ]},
  {cat:'图论', problems:[
    {id:200,name:'岛屿数量',diff:'中等'},{id:994,name:'腐烂的橘子',diff:'中等'},{id:207,name:'课程表',diff:'中等'},{id:208,name:'实现 Trie（前缀树）',diff:'中等'},
  ]},
  {cat:'回溯', problems:[
    {id:46,name:'全排列',diff:'中等'},{id:78,name:'子集',diff:'中等'},{id:17,name:'电话号码的字母组合',diff:'中等'},{id:39,name:'组合总和',diff:'中等'},
    {id:22,name:'括号生成',diff:'中等'},{id:79,name:'单词搜索',diff:'中等'},{id:131,name:'分割回文串',diff:'中等'},{id:51,name:'N 皇后',diff:'困难'},
  ]},
  {cat:'二分查找', problems:[
    {id:35,name:'搜索插入位置',diff:'简单'},{id:74,name:'搜索二维矩阵',diff:'中等'},{id:34,name:'在排序数组中查找元素的第一个和最后一个位置',diff:'中等'},

let filter = 'all';
function setFilter(f, btn) { filter = f; document.querySelectorAll('.chip').forEach(b => b.classList.remove('on')); btn.classList.add('on'); render(); }
function diffCls(d) { return d==='简单'?'easy':d==='中等'?'med':'hard'; }
function toast(msg) { const el=document.getElementById('toast'); el.textContent=msg; el.classList.add('show'); setTimeout(()=>el.classList.remove('show'),2200); }
function exportData() {
  const blob=new Blob([JSON.stringify(st,null,2)],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download=`lc_fsrs_backup_${new Date().toISOString().slice(0,10)}.json`; a.click(); toast('备份已导出');
}
function importData(e) {
  const file=e.target.files[0]; if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{ try{ st=JSON.parse(ev.target.result); save(); render(); toast('导入成功'); }catch{ toast('文件格式错误'); } };
  reader.readAsText(file); e.target.value='';
}
function render() {
  const q=document.getElementById('search').value.trim().toLowerCase();
  const counts=[0,0,0,0,0];
  DATA.forEach(s=>s.problems.forEach(p=>counts[(st[p.id]?.mastery)??0]++));

  // 今日到期数
  const dueCount = getDueToday().length;
  document.getElementById('due-count').textContent = dueCount;
  document.getElementById('review-btn').style.display = dueCount > 0 ? 'inline-flex' : 'none';

  document.getElementById('stats').innerHTML=counts.map((n,i)=>
    `<div class="stat${filter===(i===0?'all':i)?' active':''}" onclick="setFilter(${i===0?"'all'":i},this)">
      <span class="stat-num">${n}</span><span class="stat-label">${STATES[i]}</span>
    </div>`
  ).join('');
  let html='', total=0;
  DATA.forEach(sec=>{
    const rows=sec.problems.filter(p=>{
      const m=(st[p.id]?.mastery)??0;
      return (filter==='all'||m===filter)&&(!q||p.name.includes(q)||String(p.id).includes(q));
    });
    if(!rows.length)return;
    total+=rows.length;
    html+=`<div class="section"><div class="section-head">${sec.cat}<span>${rows.length} 题</span></div>`;
    rows.forEach(p=>{
      const c=st[p.id]; const m=c?.mastery??0;
      const dueTag = c && c.due && c.mastery < 4 && c.mastery > 0
        ? `<span style="font-size:10px;color:var(--text-hint);margin-left:4px;">${c.due<=today()?'📌到期':'📅'+c.due}</span>` : '';
      html+=`<div class="row">
        <span class="num">${p.id}</span>
        <span class="name"><a href="https://leetcode.cn/problems/" target="_blank">${p.name}</a>${dueTag}</span>
        <span class="badge ${diffCls(p.diff)}">${p.diff}</span>
        <button class="status-btn ${SCLS[m]}" onclick="nextState(${p.id})">${STATES[m]}</button>
      </div>`;
    });
    html+='</div>';
  });
  if(!total)html='<div class="empty">没有匹配的题目</div>';
  document.getElementById('list').innerHTML=html;
}
render();
</script>
